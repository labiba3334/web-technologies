<html>
    <head>
        <title>Welcome to pental shop</title>
         <link rel="Stylesheet" href="style.css">
    </head>
    <body>
            <h1>welcome to pental shop</h1>
            <h3>About This Lab</h3>
            
            <p>In this lab, you will learn basic HTML structure, formatting text, creating 
simple tables, and using forms for input.  </p>
<table>
    <tr>
    <th>Item Name</th>
    <th>Quantity</th>
    <th>status</th>
    </tr>
    <tr><td>Pencils</td>
        <td>100</td>
        <td>In Stock</td></tr>
    <tr><td>Notebooks</td>
        <td>50</td>
        <td>Low Stock</td></tr>
    <tr><td>Markers</td>
        <td>15</td>
        <td>In Stock</td></tr>

</table>
<form>
    <h2>Contact Information</h2>
    <label for="name">Name:</label>
    <input type="text" id="name" name="name"><br><br>
    <label for="email">Email:</label>
    <input type="email" id="email" name="email"><br><br>
    <label for="message">Message:</label><br>
    <textarea id="message" name="message"></textarea><br><br>
    <input type="submit" value="submit">
</form>
</body>

</html>
